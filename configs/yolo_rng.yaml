segmentation:
  backend: yolo
  model_path: <legacy-project-root>/examples/weights/yolo11x-seg.pt
  device: cuda
  confidence: 0.25
  iou: 0.6

grasping:
  backend: rng
  checkpoint_path: <project-root>/third_party/RegionNormalizedGrasp/checkpoints/realsense
  device: cuda
  input_size: [360, 640]

mask:
  merge_instances: true
  dilate_kernel: 10
  dilate_iterations: 2
  min_area: 0

ranking:
  backend: mask_aware
  top_k: 10
  min_target_score: 0.0
  require_center_in_mask: false
  weights:
    rng_score: 0.7
    target_score: 0.3

outputs:
  return_point_cloud: false
  return_segmentation_preview: true
  return_candidates: true
  visualize_3d: false
